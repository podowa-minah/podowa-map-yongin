<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
.card { background: #fff; border-radius: 12px; padding: 20px; margin: 12px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.title { font-weight: 700; font-size: 14px; color: #333; margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 6px; margin: 8px 0; }
.label { font-size: 12px; color: #718096; min-width: 60px; }
.big { width: 32px; height: 32px; }
.mid { width: 16px; height: 16px; }
.sm { width: 12px; height: 12px; }
.num { font-size: 12px; font-weight: 600; color: #4a5568; }
.blue { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #667eea; }
.sample { display: flex; align-items: center; gap: 4px; background: #f7fafc; padding: 6px 10px; border-radius: 8px; margin-top: 8px; }
h2 { font-size: 16px; color: #2d3748; }
</style></head><body>

<h2>나무 아이콘 후보 비교</h2>

<div class="card">
  <div class="title">1. 미니 나무 (롤리팝)</div>
  <div class="row">
    <span class="label">큰 사이즈</span>
    <img src="src/assets/icons/tree_icon_1.svg" class="big">
  </div>
  <div class="row">
    <span class="label">실제 사이즈</span>
    <img src="src/assets/icons/tree_icon_1.svg" class="mid">
  </div>
  <div class="sample">
    <span class="label">적용 예시</span>
    <img src="src/assets/icons/tree_icon_1.svg" class="sm">
    <span class="num">16</span>
    <span style="width:6px"></span>
    <span class="blue"></span>
    <span class="num">2</span>
  </div>
</div>

<div class="card">
  <div class="title">2. 잎사귀 하나</div>

    <span class="label">큰 사이즈</span>

</div>

    <span class="label">큰 사이즈</span>

  </div>
  <div class="row">
    <span class="label">실제 사이즈</span>
    <img src="src/assets/icons/tree_icon_3.svg" class="mid">
  </div>
  <div class="sample">
    <span class="label">적용 예시</span>
    <img src="src/assets/icons/tree_icon_3.svg" class="sm">

<div class="card">

</body></html>
