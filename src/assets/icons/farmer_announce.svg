<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 24" width="42" height="24">
  <!-- 밀짚모자 -->
  <rect x="6" y="0" width="16" height="2.5" rx="1" fill="#D4A44C"/>
  <rect x="4" y="2.5" width="20" height="1.8" rx="1" fill="#C49435"/>
  <rect x="8" y="2.5" width="12" height="5" rx="2" fill="#D4A44C"/>
  <!-- 머리카락 -->
  <rect x="9" y="7" width="10" height="2.5" rx="1" fill="#8B5E3C"/>
  <rect x="7" y="8.5" width="3" height="6" rx="1" fill="#8B5E3C"/>
  <rect x="18" y="8.5" width="3" height="6" rx="1" fill="#8B5E3C"/>
  <!-- 얼굴 -->
  <rect x="9" y="8.5" width="10" height="8.5" rx="3" fill="#FDDCB5"/>
  <!-- 눈 (한쪽 감은 윙크) -->
  <circle cx="12" cy="12" r="1.2" fill="#3B2F2F"/>
  <path d="M15.5 11.2 Q17 12.5 15.5 13.2" stroke="#3B2F2F" fill="none" stroke-width="1" stroke-linecap="round"/>
  <!-- 입 (크게 벌린 입) -->
  <ellipse cx="14" cy="15.5" rx="2.2" ry="1.5" fill="#D4836B"/>
  <ellipse cx="14" cy="15.1" rx="1.6" ry="0.7" fill="#fff"/>
  <!-- 볼 홍조 -->
  <circle cx="10.5" cy="14" r="1.5" fill="#FFCDB2" opacity="0.5"/>
  <circle cx="17.5" cy="14" r="1.5" fill="#FFCDB2" opacity="0.5"/>
  <!-- 몸통 - 체크셔츠 -->
  <rect x="8" y="17" width="12" height="6" rx="1" fill="#E05555"/>
  <line x1="11" y1="17" x2="11" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="17" x2="14" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="17" y1="17" x2="17" y2="23" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <!-- 멜빵 -->
  <rect x="10" y="18" width="2" height="5" rx="0.5" fill="#4A6FA5"/>
  <rect x="16" y="18" width="2" height="5" rx="0.5" fill="#4A6FA5"/>
  <!-- 왼팔 (내린 팔) -->
  <rect x="4" y="17" width="4.5" height="3" rx="1.2" fill="#FDDCB5"/>
  <!-- 오른팔 (메가폰 잡고 올린 팔) -->
  <rect x="19.5" y="12" width="3" height="7" rx="1" fill="#FDDCB5"/>
  <!-- 메가폰 -->
  <polygon points="22,10 35,4 35,16 22,13" fill="#FF8C00"/>
  <rect x="21" y="10" width="2.5" height="3.5" rx="0.5" fill="#E07000"/>
  <ellipse cx="35" cy="10" rx="1.2" ry="6" fill="#FFa500" opacity="0.6"/>
  <!-- 메가폰 소리 표현 -->
  <path d="M36.5 6 Q39 4.5 36.5 3.5" stroke="#FFa500" fill="none" stroke-width="1" stroke-linecap="round"/>
  <path d="M36.5 14 Q39 15.5 36.5 16.5" stroke="#FFa500" fill="none" stroke-width="1" stroke-linecap="round"/>
  <path d="M38 9 Q40.5 10 38 11" stroke="#FFa500" fill="none" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
</svg>
