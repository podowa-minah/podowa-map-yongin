<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- 밀짚모자 -->
  <rect x="10" y="0" width="16" height="2.5" rx="1" fill="#D4A44C"/>
  <rect x="8" y="2.5" width="20" height="1.8" rx="1" fill="#C49435"/>
  <rect x="12" y="2.5" width="12" height="5" rx="2" fill="#D4A44C"/>
  <!-- 머리카락 -->
  <rect x="13" y="7" width="10" height="2.5" rx="1" fill="#8B5E3C"/>
  <rect x="11" y="8.5" width="3" height="6" rx="1" fill="#8B5E3C"/>
  <rect x="22" y="8.5" width="3" height="6" rx="1" fill="#8B5E3C"/>
  <!-- 얼굴 -->
  <rect x="13" y="8.5" width="10" height="8.5" rx="3" fill="#FDDCB5"/>
  <!-- 눈 (한쪽 감은 윙크) -->
  <circle cx="16" cy="12" r="1" fill="#3B2F2F"/>
  <path d="M19.5 11.5 Q21 12.5 19.5 13" stroke="#3B2F2F" fill="none" stroke-width="0.8" stroke-linecap="round"/>
  <!-- 입 (크게 벌린 입) -->
  <ellipse cx="18" cy="15.5" rx="2" ry="1.3" fill="#D4836B"/>
  <ellipse cx="18" cy="15.2" rx="1.5" ry="0.6" fill="#fff"/>
  <!-- 볼 홍조 -->
  <circle cx="14.5" cy="14" r="1.3" fill="#FFCDB2" opacity="0.5"/>
  <circle cx="21.5" cy="14" r="1.3" fill="#FFCDB2" opacity="0.5"/>
  <!-- 몸통 - 체크셔츠 -->
  <rect x="12" y="17" width="12" height="3.5" rx="1" fill="#E05555"/>
  <line x1="15" y1="17" x2="15" y2="20.5" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="17" x2="18" y2="20.5" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="21" y1="17" x2="21" y2="20.5" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <!-- 멜빵 작업복 -->
  <rect x="13" y="20" width="10" height="8" rx="1" fill="#4A6FA5"/>
  <rect x="15" y="18" width="2" height="3.5" rx="0.5" fill="#4A6FA5"/>
  <rect x="19" y="18" width="2" height="3.5" rx="0.5" fill="#4A6FA5"/>
  <!-- 벨트 -->
  <rect x="13" y="23" width="10" height="1.2" fill="#8B6543"/>
  <rect x="17" y="22.5" width="1.8" height="2" rx="0.5" fill="#C49435"/>
  <!-- 왼팔 (내린 팔) -->
  <rect x="8" y="17" width="4.5" height="2.5" rx="1.2" fill="#FDDCB5"/>
  <!-- 오른팔 (메가폰 잡고 올린 팔) -->
  <rect x="23" y="14" width="2.5" height="6" rx="1" fill="#FDDCB5"/>
  <!-- 메가폰 -->
  <polygon points="25,12 37,7 37,17 25,15" fill="#FF8C00"/>
  <rect x="24" y="12" width="2" height="3" rx="0.5" fill="#E07000"/>
  <ellipse cx="37" cy="12" rx="1" ry="5" fill="#FFa500" opacity="0.6"/>
  <!-- 메가폰 소리 표현 -->
  <path d="M38 9 Q40 8 38 7" stroke="#FFa500" fill="none" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M38 15 Q40 16 38 17" stroke="#FFa500" fill="none" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M39 11 Q41 12 39 13" stroke="#FFa500" fill="none" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
  <!-- 다리 -->
  <rect x="14" y="27.5" width="3.5" height="4.5" rx="1" fill="#4A6FA5"/>
  <rect x="19" y="27.5" width="3.5" height="4.5" rx="1" fill="#4A6FA5"/>
  <!-- 부츠 -->
  <rect x="13" y="31" width="4.5" height="2.5" rx="1" fill="#6B3A2A"/>
  <rect x="19" y="31" width="4.5" height="2.5" rx="1" fill="#6B3A2A"/>
</svg>
