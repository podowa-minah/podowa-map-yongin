<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 흰 둥근 사각형 배경 -->
  <rect x="4" y="4" width="92" height="92" rx="16" ry="16" fill="#ffffff" stroke="#4a7c3f" stroke-width="4"/>

  <!-- 약병 몸통 -->
  <rect x="28" y="38" width="44" height="44" rx="8" ry="8" fill="#e5a100"/>

  <!-- 약병 목 -->
  <rect x="38" y="24" width="24" height="16" rx="3" ry="3" fill="#e5a100"/>

  <!-- 약병 뚜껑 -->
  <rect x="36" y="16" width="28" height="10" rx="4" ry="4" fill="#333333"/>
  <!-- 뚜껑 줄 -->
  <line x1="40" y1="21" x2="60" y2="21" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="60" y2="24" stroke="#555" stroke-width="1" stroke-linecap="round"/>

  <!-- 라벨 영역 -->
  <rect x="34" y="52" width="32" height="24" rx="3" ry="3" fill="#444444"/>

  <!-- 라벨에 십자 표시 -->
  <rect x="46" y="56" width="8" height="16" rx="1" fill="#e5a100"/>
  <rect x="40" y="60" width="20" height="8" rx="1" fill="#e5a100"/>

  <!-- 눈 (정면 응시) -->
  <circle cx="40" cy="44" r="5" fill="#ffffff"/>
  <circle cx="58" cy="44" r="5" fill="#ffffff"/>
  <circle cx="40" cy="44" r="2.8" fill="#222222"/>
  <circle cx="58" cy="44" r="2.8" fill="#222222"/>
</svg>
