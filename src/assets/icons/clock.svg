<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 둥근 사각형 배경 테두리 -->
  <rect x="4" y="4" width="92" height="92" rx="16" ry="16" fill="#ffffff" stroke="#4a7c3f" stroke-width="5"/>

  <!-- 시계 외곽 원 -->
  <circle cx="50" cy="50" r="28" fill="#d4a733" stroke="#4a7c3f" stroke-width="3"/>

  <!-- 시계 눈금 (12시, 3시, 6시, 9시) -->
  <line x1="50" y1="26" x2="50" y2="30" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="70" x2="50" y2="74" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="50" x2="30" y2="50" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="50" x2="74" y2="50" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>

  <!-- 시계 바늘 (시침 + 분침) -->
  <line x1="50" y1="50" x2="50" y2="34" stroke="#4a7c3f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="62" y2="42" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>

  <!-- 중심점 -->
  <circle cx="50" cy="50" r="2" fill="#4a7c3f"/>

  <!-- 눈 -->
  <circle cx="42" cy="46" r="4" fill="#ffffff"/>
  <circle cx="58" cy="46" r="4" fill="#ffffff"/>
  <circle cx="43" cy="46" r="2" fill="#2d2d2d"/>
  <circle cx="59" cy="46" r="2" fill="#2d2d2d"/>

  <!-- 입 (미소) -->
  <path d="M42 56 Q50 63 58 56" fill="none" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
</svg>
