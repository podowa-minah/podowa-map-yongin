  <circle cx="9" cy="14.2" r="1.3" fill="#FFCDB2" opacity="0.5"/>
  <circle cx="17.5" cy="14.2" r="1.3" fill="#FFCDB2" opacity="0.5"/>
  <!-- 몸통 - 체크셔츠 -->
  <rect x="7" y="17.5" width="12" height="3.5" rx="1" fill="#E05555"/>
