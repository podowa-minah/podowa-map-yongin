  <rect x="8" y="25" width="14" height="3.5" rx="1.5" fill="#4A6FA5"/>
  <!-- 부츠 -->
  <rect x="19" y="24.5" width="5" height="4.5" rx="1.2" fill="#6B3A2A"/>
  <rect x="8" y="24.5" width="5" height="4.5" rx="1.2" fill="#6B3A2A"/>
