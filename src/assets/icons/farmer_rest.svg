  <rect x="18" y="20" width="5" height="2.5" rx="1.2" fill="#FDDCB5"/>
  <!-- 바닥 -->
  <rect x="0" y="29" width="44" height="1.2" rx="0.5" fill="#8B6543" opacity="0.25"/>

  <!-- === 오리 === -->
