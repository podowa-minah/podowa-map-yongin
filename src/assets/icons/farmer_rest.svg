  <rect x="9" y="18.5" width="2" height="3.5" rx="0.5" fill="#4A6FA5"/>
  <rect x="15" y="18.5" width="2" height="3.5" rx="0.5" fill="#4A6FA5"/>
  <!-- 엉덩이/하체 (앉은 자세) -->
