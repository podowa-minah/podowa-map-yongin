<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="44" height="36">
  <!-- 밀짚모자 -->
  <rect x="4" y="0" width="18" height="2.5" rx="1" fill="#D4A44C"/>
  <rect x="2" y="2.5" width="22" height="1.8" rx="1" fill="#C49435"/>
  <rect x="6" y="2.5" width="14" height="5" rx="2" fill="#D4A44C"/>
