  <line x1="13" y1="17.5" x2="13" y2="21" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="17.5" x2="16" y2="21" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
